spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: socket-gateway

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/chat_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: 0
    locations: classpath:db/migration
    table: ${FLYWAY_TABLE:flyway_schema_history_socket_gateway}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/ecommerce}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8180/realms/ecommerce/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8090}

socket:
  host: ${SOCKET_HOST:0.0.0.0}
  port: ${SOCKET_PORT:9093}
  allowed-origin: ${SOCKET_ALLOWED_ORIGIN:*}
  auth:
    enabled: ${SOCKET_AUTH_ENABLED:true}

app:
  security:
    keycloak-client-id: ${KEYCLOAK_CLIENT_ID:ecommerce-backend}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.ecommerce.socketgateway: DEBUG
    com.corundumstudio.socketio: INFO
